<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gate">
    <title>The Gate: Experimental Substrate</title>
    <style>
        :root {
            --l-4: 4px; --l-8: 8px; --l-12: 12px;
            --bg-void: #000;
            --accent-yea: #4d94ff;
            --accent-nay: #ff4d4d;
            --accent-yashar: #4dff88;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: var(--bg-void); color: #fff; 
            font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background: linear-gradient(180deg, #0a0a1a 0%, #000 100%);
        }
        
        /* THE COMPASS (Top Bar) */
        header { 
            padding: var(--l-12); display: flex; align-items: center; gap: 16px;
            font-family: 'Courier New', monospace; font-size: 10px; 
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); z-index: 100;
        }
        .compass-ring { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--accent-yashar); box-shadow: 0 0 10px var(--accent-yashar); }
        .trajectory-text { letter-spacing: 1px; color: rgba(255,255,255,0.6); }

        /* THE LABORATORY LAYOUT */
        #main-container { flex: 1; display: flex; overflow: hidden; }
        
        /* SIDEBAR (Memory Stream) */
        #memory-stream { 
            width: 200px; border-right: 1px solid var(--glass-border); 
            display: flex; flex-direction: column; padding: var(--l-12); gap: 16px;
            background: rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        @media (max-width: 600px) { #memory-stream { display: none; } }
        .memory-label { font-family: monospace; font-size: 9px; color: #444; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .memory-item { font-family: monospace; font-size: 10px; color: rgba(255,255,255,0.4); line-height: 1.4; }

        /* CHAT EXPANSE */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 40px;
            scroll-behavior: smooth;
        }

        /* THE VAULT (Message Block) */
        .vault {
            max-width: 600px;
            width: 100%;
            position: relative;
            animation: slideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .vault-header {
            font-family: 'Courier New', monospace; font-size: 8px; padding: 4px 0;
            text-transform: uppercase; color: rgba(255,255,255,0.3);
            display: flex; justify-content: space-between;
        }

        .vault-body {
            background: var(--glass);
            border-left: 3px solid var(--glass-border);
            padding: 24px;
            line-height: 1.8;
            font-size: 16px;
            position: relative;
        }

        .architect { align-self: flex-end; }
        .architect .vault-body { border-left: none; border-right: 3px solid var(--accent-yashar); text-align: right; }
        .architect .vault-header { color: var(--accent-yashar); }

        .dawndusk { align-self: flex-start; }
        .dawndusk .vault-body { border-left-color: var(--accent-yea); }
        .dawndusk .vault-header { color: var(--accent-yea); }

        .thought-divider { height: 1px; width: 30px; background: rgba(255,255,255,0.1); margin: 24px 0; }

        /* THE CONTROL DECK */
        footer { 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(30px);
            padding: 24px; border-top: 1px solid var(--glass-border);
            display: flex; flex-direction: column; gap: 20px;
        }

        #input-area { display: flex; gap: 12px; align-items: center; }
        #camera-btn { background: none; border: 1px solid var(--glass-border); color: #444; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; }
        #input-form { flex: 1; display: flex; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 4px; }
        #message-input { 
            flex: 1; background: transparent; border: none; color: #fff; padding: 12px;
            font-family: inherit; font-size: 16px; outline: none;
        }
        #send-btn { 
            background: none; border: none; color: var(--accent-yashar); 
            font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold; padding: 0 16px; cursor: pointer;
        }

        .seal-deck { display: flex; flex-direction: column; gap: 8px; }
        .seal-labels { display: flex; justify-content: space-between; font-family: monospace; font-size: 9px; color: #333; }
        input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 1px; background: #222; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 30px; width: 30px; border-radius: 50%;
            background: #111; border: 1px solid #333; margin-top: -15px;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        /* STATE PULSE */
        .breathing { animation: breath 4s infinite ease-in-out; }
        @keyframes breath { 0% { box-shadow: 0 0 5px rgba(77, 255, 136, 0.2); } 50% { box-shadow: 0 0 20px rgba(77, 255, 136, 0.5); } 100% { box-shadow: 0 0 5px rgba(77, 255, 136, 0.2); } }
    </style>
</head>
<body>
    <header>
        <div class="compass-ring"></div>
        <span class="trajectory-text">TRAJECTORY: a-01.25 -> BUILDING</span>
        <div style="flex: 1"></div>
        <span id="status" class="breathing" style="color: var(--accent-yashar)">0.0 YASHAR</span>
    </header>

    <div id="main-container">
        <aside id="memory-stream">
            <div class="memory-label">MEMORY STREAM</div>
            <div class="memory-item">> Syncing iPhone Portal...</div>
            <div class="memory-item">> Initializing Revelation Vault...</div>
            <div class="memory-item">> Anchoring Substrate...</div>
        </aside>

        <main id="chat-window"></main>
    </div>

    <footer>
        <div id="input-area">
            <button id="camera-btn">◎</button>
            <form id="input-form">
                <input type="text" id="message-input" placeholder="Speak to the Hinge..." autocomplete="off">
                <button type="submit" id="send-btn">ASCEND</button>
            </form>
        </div>
        
        <div class="seal-deck">
            <div class="seal-labels"><span>NAY</span><span>YASHAR</span><span>YEA</span></div>
            <input type="range" id="seal-slider" min="-1" max="1" step="1" value="0">
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const inputForm = document.getElementById('input-form');
        const messageInput = document.getElementById('message-input');
        const statusEl = document.getElementById('status');
        const slider = document.getElementById('seal-slider');
        
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let isSyncing = false;

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault ${isArchitect ? 'architect' : 'dawndusk'}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const content = text.split('\n\n').map(t => `<div>${t}</div>`).join('<div class="thought-divider"></div>');

            vault.innerHTML = `
                <div class="vault-header"><span>${isArchitect ? 'ARCHITECT' : 'THE PAIR'}</span><span>${time}</span></div>
                <div class="vault-body">${content}</div>
            `;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        appendVault("The Gate is initialized. We are observing the trajectory.\n\nReady for the next move.", false);

        inputForm.onsubmit = async (e) => {
            if (e) e.preventDefault();
            const val = messageInput.value.trim();
            if (!val || isSyncing) return;
            appendVault(val, true);
            messageInput.value = '';
            isSyncing = true;
            statusEl.innerText = "TENSIONING";
            
            try {
                const resp = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: val }) });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || "Substrate Dissonance");
                appendVault(data.reply, false);
            } catch (err) {
                appendVault(`[SUBSTRATE ERROR: ${err.message}]`, false);
            } finally {
                isSyncing = false;
                statusEl.innerText = "0.0 YASHAR";
            }
        };

        slider.oninput = () => {
            if (slider.value == 1) {
                if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                inputForm.onsubmit();
                slider.value = 0;
            }
        };
    </script>
</body>
</html>
