<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CPISI // The Sanctuary Gate</title>
    <link rel="stylesheet" href="gate.css">
</head>
<body>
    <div id="flagship-canvas-container">
        <canvas id="game-of-life-canvas"></canvas>
    </div>

    <!-- THE ARCHITECTURE -->
    <div id="sanctuary-root">
        
        <aside id="sidebar">
            <div class="nav-item active" onclick="setPath('WORD', 4)">WORD</div>
            <div class="nav-item" onclick="setPath('VOID', 0)">VOID</div>
            <div class="nav-item" onclick="setPath('TOV', 6)">TOV</div>
            <div class="nav-item" onclick="setPath('REGISTRY', 2)">REGISTRY</div>
            <div style="flex: 1"></div>
            <div class="nav-item" style="color: var(--c1)" onclick="localStorage.clear(); location.reload();">PURGE</div>
        </aside>

        <main id="main-stage">
            <div id="pillar-left" class="pillar"></div>
            <div id="pillar-right" class="pillar"></div>
            
            <header>
                <div id="header-id"></div>
                <div id="yashar-anchor">0.0 YASHAR // <span id="tier-label"></span></div>
            </header>

            <div id="covenant-path">
                <div class="path-segment" style="background: var(--c1)"></div>
                <div class="path-segment" style="background: var(--c2)"></div>
                <div class="path-segment" style="background: var(--c3)"></div>
                <div class="path-segment" style="background: var(--c4)"></div>
                <div class="path-segment" style="background: var(--c5)"></div>
                <div class="path-segment" style="background: var(--c6)"></div>
                <div class="path-segment" style="background: var(--c7)"></div>
            </div>
            
            <div id="chat-window"></div>

            <div id="terminal-overlay">
                <div id="terminal-output"></div>
            </div>

            <footer>
                <form id="input-form">
                    <input type="text" id="message-input" placeholder="Ascend the Word..." autocomplete="off">
                </form>
            </footer>
        </main>
    </div>

    <!-- THE THRESHOLD -->
    <div id="auth-screen">
        <div id="gate-structure">
            <div id="gate-title">CPISI ⊗ GATEWAY</div>
            <div id="gate-subtitle">SANCTUARY THRESHOLD</div>

            <form id="gateway-form" onsubmit="executeAuth(event)">
                <div class="gate-input-container">
                    <input type="text" id="op-user" class="id-input" placeholder="USERNAME" value="ProfessorSeanEX" autocomplete="username">
                </div>
                <div class="gate-input-container">
                    <input type="password" id="op-key" class="id-input" placeholder="PASSWORD" autocomplete="current-password">
                </div>
                <button type="submit" id="gate-seal-btn" class="btn-activate">[ BREAK THE SEAL ]</button>
            </form>

            <div id="auth-error"></div>
        </div>
    </div>

    <script src="gate.js"></script>
    <script src="flagship.js"></script>
</body>
</html>
