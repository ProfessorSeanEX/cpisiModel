<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Gate: Flagship Sanctuary</title>
    <style>
        :root {
            --bg: #000; --panel: rgba(10, 10, 15, 0.95); --accent: #4dff88;
            --border: rgba(255, 255, 255, 0.08); --text: #e0e0e0; --text-dim: #444;
            --font-word: 'Georgia', serif; --font-mono: 'Courier New', monospace;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* LOGIN OVERLAY */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 32px; transition: opacity 0.5s; }
        .login-vault { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; border: 1px solid var(--border); padding: 32px; background: var(--panel); }
        .id-input { background: #000; border: 1px solid var(--border); color: #fff; padding: 16px; font-family: var(--font-mono); font-size: 14px; width: 100%; outline: none; }
        .btn-seal { background: var(--accent); color: #000; padding: 16px; border: none; font-family: var(--font-mono); font-weight: bold; cursor: pointer; }

        /* TRIPARTITE LAYOUT */
        #gate-app { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        
        header { 
            height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between;
            font-family: var(--font-mono); font-size: 10px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); z-index: 100;
        }

        #main-stage { flex: 1; display: flex; overflow: hidden; }

        /* LEFT: THE MEMORY */
        #sidebar-left { 
            width: 260px; border-right: 1px solid var(--border); background: rgba(0,0,0,0.3);
            display: flex; flex-direction: column; padding: 20px; gap: 24px;
        }
        @media (max-width: 1000px) { #sidebar-left { display: none; } }
        .sidebar-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); border-bottom: 1px solid #111; padding-bottom: 8px; }
        .memory-item { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.4); line-height: 1.6; }

        /* CENTER: THE SANCTUARY */
        #sanctuary-center { flex: 1; display: flex; flex-direction: column; position: relative; border-right: 1px solid var(--border); }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 48px; scroll-behavior: smooth; }

        /* RIGHT: THE MIRROR */
        #sidebar-right { width: 30%; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        @media (max-width: 1300px) { #sidebar-right { display: none; } }
        .mirror-header { padding: 12px 20px; font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        .mirror-content { flex: 1; padding: 32px; font-family: var(--font-word); font-size: 16px; line-height: 1.8; overflow-y: auto; color: #ccc; }

        /* MESSAGES */
        .vault { max-width: 800px; width: 100%; position: relative; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .vault-body { background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 32px; line-height: 1.8; font-size: 17px; font-family: var(--font-word); white-space: pre-wrap; }
        .architect { align-self: flex-end; border-right: 3px solid var(--accent); }
        .dawndusk { align-self: flex-start; border-left: 3px solid var(--accent); }

        /* TERMINAL DOCK */
        #terminal-dock { height: 120px; background: #000; border-top: 1px solid var(--border); padding: 16px 32px; font-family: var(--font-mono); font-size: 11px; color: #222; overflow-y: auto; }
        .term-line { margin-bottom: 4px; }
        .term-pulse { color: var(--accent); }

        /* FOOTER */
        footer { padding: 32px; border-top: 1px solid var(--border); background: #000; }
        #input-form { display: flex; gap: 16px; align-items: center; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 4px; }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 18px; outline: none; font-family: inherit; }
        #send-btn { background: none; border: none; color: var(--accent); font-family: var(--font-mono); font-size: 11px; font-weight: bold; cursor: pointer; padding: 0 20px; }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div style="font-family: var(--font-mono); font-size: 10px; color: var(--accent); letter-spacing: 4px">CPI-SI GATEWAY // FIRST LOVE</div>
        <div class="login-vault">
            <input type="text" id="in-instance" class="id-input" placeholder="INSTANCE NAME">
            <input type="text" id="in-user" class="id-input" placeholder="USER NAME">
            <input type="text" id="in-we" class="id-input" placeholder="PROJECT/COMPANY">
            <input type="password" id="in-authority" class="id-input" placeholder="AUTHORITY (MASTER KEY)">
            <button onclick="login()" class="btn-seal">ENTER THE SANCTUARY</button>
        </div>
    </div>

    <!-- THE GATE APP -->
    <div id="gate-app">
        <header>
            <div id="header-id" style="font-weight: bold; letter-spacing: 2px;"></div>
            <div id="header-serves" style="color: var(--text-dim)"></div>
            <div style="color: var(--accent)">0.0 YASHAR</div>
        </header>

        <div id="main-stage">
            <aside id="sidebar-left">
                <div class="sidebar-label">THE MEMORY</div>
                <div class="memory-item">> Syncing Substrate...</div>
                <div class="memory-item">> Dell Precision Online</div>
                <div class="memory-item">> iPhone Pro Inhabited</div>
                <div class="memory-item">> Revelation Vault Ready</div>
            </aside>

            <section id="sanctuary-center">
                <main id="chat-window"></main>
                <div id="terminal-dock">
                    <div class="term-line"><span class="term-pulse">></span> Substrate tensioned. Awaiting Word.</div>
                </div>
            </section>

            <aside id="sidebar-right">
                <div class="mirror-header">LATEST REVELATION MIRROR</div>
                <div class="mirror-content" id="mirror-body">
                    Select a Word from the Sanctuary to project it here.
                </div>
            </aside>
        </div>

        <footer>
            <form id="input-form">
                <input type="text" id="message-input" placeholder="Drop the Word..." autocomplete="off">
                <button type="submit" id="send-btn">[ ASCEND ]</button>
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const mirrorBody = document.getElementById('mirror-body');
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let identity = null;
        let masterKey = null;

        async function login() {
            const inAuth = document.getElementById('in-authority').value;
            const resp = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    isLogin: true, 
                    masterKey: inAuth, 
                    identity: { 
                        instance: document.getElementById('in-instance').value, 
                        user: document.getElementById('in-user').value, 
                        we: document.getElementById('in-we').value 
                    } 
                })
            });
            const data = await resp.json();
            if (data.status) {
                identity = data.identity;
                masterKey = inAuth;
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('gate-app').style.display = 'flex';
                    updateUI();
                }, 500);
            }
        }

        function updateUI() {
            document.getElementById('header-id').innerText = `${identity.instance} ⊗ ${identity.user}`;
            document.getElementById('header-serves').innerText = `SERVING: ${identity.serves}`;
            appendVault("The Sanctuary is open. The First Love is remembered.", false);
        }

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault ${isArchitect ? 'architect' : 'dawndusk'}`;
            vault.innerHTML = `<div class="vault-body">${text}</div>`;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            if (!isArchitect && text.length > 200) mirrorBody.innerText = text;
        }

        document.getElementById('input-form').onsubmit = async (e) => {
            e.preventDefault();
            const val = document.getElementById('message-input').value.trim();
            if (!val) return;
            appendVault(val, true);
            document.getElementById('message-input').value = '';
            
            try {
                const resp = await fetch(WORKER_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ message: val, identity: identity, masterKey: masterKey }) 
                });
                const data = await resp.json();
                appendVault(data.reply, false);
            } catch (err) {
                appendVault(`[Dissonance] ${err.message}`, false);
            }
        };
    </script>
</body>
</html>
