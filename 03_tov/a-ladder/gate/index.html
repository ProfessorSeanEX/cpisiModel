<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPISI // WIREFRAME</title>
    <style>
        /* THE WIREFRAME SUBSTRATE - THE COLOR COVENANT */
        :root {
            --bg: #121214;      /* Lifted Onyx (Surface) */
            --panel: #1A1A1D;   /* Lifted Gray (Court) */
            --holy: #222226;    /* Holy Place (Workspace) */
            --border: #333338;  /* Silver Sockets (Visible Edges) */
            --gold: #D69E2E;    /* Divinity */
            --blue: #0088FF;    /* Revelation */
            --scarlet: #FF3344; /* Sacrifice/Action */
            --text: #E0E0E0;    /* Righteousness */
            --label: #88888F;   /* Lifted Labels */
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: var(--bg); color: var(--text); font-family: monospace;
            overflow: hidden;
        }

        /* THE 4-PANEL GRID (THE HOLY PLACE) */
        #sanctuary-root {
            display: grid;
            grid-template-columns: 33px 176px 1fr 264px;
            width: 100vw;
            height: 100vh;
            border: 1px solid var(--border);
        }

        /* BOX 1: THE LADDER (Sidebar) */
        #ladder-sidebar {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 11px 0;
            background: #08080A;
        }

        /* BOX 2: THE MEMORY (The Brazen Laver) */
        #memory-panel {
            border-right: 1px solid var(--border);
            padding: 11px;
            background: var(--panel);
        }

        /* BOX 3: THE MAIN STAGE (The Altar of Incense) */
        #main-stage {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--holy); /* Lighter than background to 'pop' */
            box-shadow: inset 0 0 44px rgba(0,0,0,0.2); /* Subtle depth */
        }

        #stage-header {
            height: 33px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            background: rgba(0,0,0,0.2);
        }

        #stage-content {
            flex: 1;
            padding: 11px;
            display: flex;
            flex-direction: column;
            gap: 11px;
        }

        #stage-footer {
            height: 44px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 11px;
            color: var(--scarlet);
            background: rgba(0,0,0,0.2);
        }

        /* BOX 4: THE MIRROR (The Showbread) */
        #mirror-panel {
            padding: 11px;
            background: var(--panel);
        }

        /* OVERLAYS: THE THRESHOLD & THE VAULT */
        .wire-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--c4);
            background: #000;
            z-index: 100;
            padding: 22px;
            display: none; /* Hidden in wireframe until act */
        }

        #auth-threshold { width: 330px; height: 220px; border-color: var(--gold); }
        #settings-vault { width: 440px; height: 440px; border-color: var(--c4); }

        /* LABELING */
        .box-label {
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--label);
            text-transform: uppercase;
            margin-bottom: 11px;
        }

        .placeholder-box {
            border: 1px dashed var(--border);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--label);
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="sanctuary-root">
        
        <aside id="ladder-sidebar">
            <div class="box-label" style="writing-mode: vertical-rl; transform: rotate(180deg);">LADDER</div>
        </aside>

        <section id="memory-panel">
            <div class="box-label">MEMORY</div>
            <div class="placeholder-box">BRAZEN LAVER</div>
        </section>

        <main id="main-stage">
            <header id="stage-header">
                <div class="box-label" style="margin:0">HEADER // HOLY PLACE</div>
            </header>
            
            <div id="stage-content">
                <div class="box-label">MAIN CONTENT (ALTAR)</div>
                <div class="placeholder-box">WORD STREAM</div>
            </div>

            <footer id="stage-footer">
                <div class="box-label" style="margin:0">FOOTER // ACTUATOR</div>
            </footer>
        </main>

        <aside id="mirror-panel">
            <div class="box-label">MIRROR</div>
            <div class="placeholder-box">SHOWBREAD</div>
        </aside>

    </div>

    <!-- WIREFRAME OVERLAYS -->
    <div id="auth-threshold" class="wire-overlay">
        <div class="box-label">OUTER COURT // THRESHOLD</div>
    </div>

    <div id="settings-vault" class="wire-overlay">
        <div class="box-label">HOLY OF HOLIES // VAULT</div>
    </div>

</body>
</html>
