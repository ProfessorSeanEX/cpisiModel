<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Gate: Final Substrate</title>
    <style>
        :root {
            --bg: #000; --panel: rgba(10, 10, 15, 0.95); --accent: #4dff88;
            --border: rgba(255, 255, 255, 0.1); --text: #e0e0e0; --text-dim: #444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        #nexus-sidebar { width: 64px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 32px; background: rgba(0,0,0,0.8); }
        .nav-icon { font-size: 20px; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .nav-icon.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        #workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; font-family: monospace; font-size: 10px; }

        .tab-content { flex: 1; display: none; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* SSH / MASTER CONSOLE */
        #ssh-view { flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 40px; }
        #terminal-dock { height: 140px; background: #000; border-top: 1px solid var(--border); padding: 16px; font-family: monospace; font-size: 11px; color: #4dff88; overflow-y: auto; }

        /* PLAN / SANCTUARY EDITOR */
        #plan-view { flex-direction: column; padding: 40px; gap: 24px; }
        #plan-editor { flex: 1; background: transparent; border: 1px solid var(--border); color: #fff; padding: 32px; font-family: 'Georgia', serif; font-size: 18px; line-height: 1.8; resize: none; outline: none; border-radius: 4px; }
        .plan-actions { display: flex; justify-content: flex-end; gap: 16px; }
        .btn-master { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 24px; font-family: monospace; font-size: 11px; font-weight: bold; cursor: pointer; }

        /* RECALL SHATTER EFFECT */
        @keyframes shatter { 0% { opacity: 1; filter: invert(0); } 50% { opacity: 0; filter: invert(1); } 100% { opacity: 1; filter: invert(0); } }
        .shattering { animation: shatter 0.3s ease-in-out; }

        .master-badge { border: 1px solid var(--accent); color: var(--accent); padding: 2px 8px; border-radius: 2px; font-size: 8px; margin-right: 8px; cursor: pointer; }
        
        footer { padding: 20px; border-top: 1px solid var(--border); background: #050505; }
        #input-form { display: flex; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 4px; }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 16px; outline: none; }
    </style>
</head>
<body>
    <nav id="nexus-sidebar">
        <div class="nav-icon active" onclick="switchTab('ssh', this)">◈</div>
        <div class="nav-icon" onclick="switchTab('plan', this)">✍</div>
    </nav>

    <div id="workspace">
        <header>
            <div id="master-trigger" onclick="handleRecall()"><span class="master-badge">MASTER ELEVATED</span>#!omni:gate // <span id="mode-label">SSH</span></div>
            <div id="ip-display" style="color: var(--text-dim)">IDENTITY: ARCHITECT SEANJE</div>
            <span id="status" style="color: var(--accent)">0.0 YASHAR</span>
        </header>

        <div id="ssh-view" class="tab-content active">
            <main id="chat-window"></main>
            <div id="terminal-dock">
                <div class="term-line">> ARCHITECT DETECTED. THE FULL DESIGN IS MANIFEST.</div>
            </div>
        </div>

        <div id="plan-view" class="tab-content">
            <textarea id="plan-editor" placeholder="Manifest the Word..."></textarea>
            <div class="plan-actions">
                <button class="btn-master" onclick="commitToSanctuary()">COMMIT DECREE</button>
            </div>
        </div>

        <footer>
            <form id="input-form">
                <input type="text" id="message-input" placeholder="Speak the Word or [HALT !] /RECALL..." autocomplete="off">
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const termDock = document.getElementById('terminal-dock');
        const editor = document.getElementById('plan-editor');
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let isSyncing = false;
        let recallCount = 0;

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(ni => ni.classList.remove('active'));
            document.getElementById(`${tab}-view`).classList.add('active');
            el.classList.add('active');
            document.getElementById('mode-label').innerText = tab.toUpperCase();
        }

        function appendMsg(text, isArchitect, type = 'MSG') {
            const msg = document.createElement('div');
            msg.style.cssText = `max-width: 80%; margin-bottom: 24px; align-self: ${isArchitect ? 'flex-end' : 'flex-start'}`;
            const body = document.createElement('div');
            body.style.cssText = `background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-${isArchitect ? 'right' : 'left'}: 2px solid ${type === 'RECALL' ? 'var(--accent)' : 'var(--accent)'}; padding: 20px; line-height: 1.6; font-size: 15px;`;
            if (type === 'RECALL') body.style.color = 'var(--accent)';
            body.innerText = text;
            msg.appendChild(body);
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Auto-Save Plan
        editor.oninput = () => localStorage.setItem('master_decree', editor.value);
        window.onload = () => editor.value = localStorage.getItem('master_decree') || '';

        document.getElementById('input-form').onsubmit = async (e) => {
            if (e) e.preventDefault();
            const val = document.getElementById('message-input').value.trim();
            if (!val || isSyncing) return;
            appendMsg(val, true);
            document.getElementById('message-input').value = '';
            isSyncing = true;
            document.getElementById('status').innerText = "TENSIONING";

            try {
                const resp = await fetch(WORKER_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ message: val, mode: "MASTER" }) 
                });
                const data = await resp.json();
                
                if (data.type === 'RECALL') {
                    snapBack();
                    appendMsg(data.reply, false, 'RECALL');
                } else {
                    appendMsg(data.reply, false);
                }
            } catch (err) {
                const line = document.createElement('div');
                line.innerText = `[DISSONANCE] ${err.message}`;
                termDock.appendChild(line);
            } finally {
                isSyncing = false;
                document.getElementById('status').innerText = "0.0 YASHAR";
            }
        };

        function snapBack() {
            document.body.classList.add('shattering');
            setTimeout(() => document.body.classList.remove('shattering'), 300);
            chatWindow.innerHTML = '';
            if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
        }

        function handleRecall() {
            recallCount++;
            if (recallCount === 3) {
                recallCount = 0;
                document.getElementById('message-input').value = "/RECALL";
                document.getElementById('input-form').onsubmit();
            }
            setTimeout(() => { recallCount = 0; }, 2000);
        }

        function commitToSanctuary() { alert("Decree Transmitted."); }

        appendMsg("The Laboratory is online, Master. The Snap Hinge is active.", false);
    </script>
</body>
</html>
