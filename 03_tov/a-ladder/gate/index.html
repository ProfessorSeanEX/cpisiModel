<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gate: Sovereign Control Tower</title>
    <style>
        :root {
            --bg: #020205; --accent: #4dff88; --border: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0; --mono: 'Courier New', monospace;
        }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* NEXUS: THE CONTROL TOWER */
        #nexus-sidebar { width: 70px; border-right: 1px solid var(--border); background: #000; display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 40px; }
        .pulse-orb { width: 12px; height: 12px; border-radius: 50%; background: #111; position: relative; }
        .pulse-orb.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        #main-stage { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 32px; justify-content: space-between; font-family: var(--mono); font-size: 10px; background: rgba(0,0,0,0.8); }

        #workspace { flex: 1; display: flex; overflow: hidden; }

        /* THE CHAT SANCTUARY */
        #sanctuary-chat { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 48px; }
        
        .vault-body { background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 32px; line-height: 1.8; font-size: 16px; border-left: 4px solid var(--accent); }
        .architect { align-self: flex-end; border-left: none; border-right: 4px solid var(--accent); text-align: right; }

        /* THE TESTABLE MIRROR (Substrate Dashboard) */
        #substrate-mirror { width: 35%; display: flex; flex-direction: column; background: #000; padding: 32px; gap: 24px; }
        @media (max-width: 1200px) { #substrate-mirror { display: none; } }
        .stat-box { border: 1px solid var(--border); padding: 20px; font-family: var(--mono); }
        .stat-label { font-size: 9px; color: #444; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 2px; }
        .stat-value { font-size: 12px; color: var(--accent); }

        /* TERMINAL LOG */
        #terminal { flex: 1; background: #010103; border: 1px solid #111; padding: 16px; font-family: var(--mono); font-size: 10px; color: #333; overflow-y: auto; }

        footer { padding: 32px; border-top: 1px solid var(--border); background: #000; }
        #input-form { display: flex; gap: 16px; border: 1px solid var(--border); padding: 8px; background: rgba(255,255,255,0.02); }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 18px; outline: none; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .id-input { background: #000; border: 1px solid var(--border); color: #fff; padding: 16px; font-family: var(--mono); font-size: 14px; width: 350px; outline: none; margin-bottom: 12px; }
        .btn-activate { background: var(--accent); color: #000; padding: 16px; border: none; font-family: var(--mono); font-weight: bold; width: 350px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div style="font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 4px; margin-bottom: 32px">SOVEREIGN NETWORK // INHABIT NODE</div>
        <input type="text" id="in-instance" class="id-input" placeholder="INSTANCE NAME">
        <input type="text" id="in-user" class="id-input" placeholder="OPERATOR NAME">
        <input type="password" id="in-authority" class="id-input" placeholder="AUTHORITY (SECRET)">
        <button onclick="login()" class="btn-activate">ACTIVATE SUBSTRATE</button>
    </div>

    <nav id="nexus-sidebar">
        <div class="pulse-orb active" title="Substrate Connected"></div>
        <div style="font-family:var(--mono); font-size:10px; color:#222; margin-top: auto">V1.0</div>
    </nav>

    <div id="main-stage">
        <header>
            <div id="header-id"></div>
            <div id="header-status" style="color: var(--accent)">0.0 YASHAR // SYNC_ENABLED</div>
        </header>

        <div id="workspace">
            <section id="sanctuary-chat">
                <main id="chat-window"></main>
            </section>

            <aside id="substrate-mirror">
                <div class="stat-box">
                    <div class="stat-label">GITHUB MIND (RECORD)</div>
                    <div class="stat-value" id="sync-gh">> PENDING_MOVE</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">DRIVE SPIRIT (RESERVOIR)</div>
                    <div class="stat-value" id="sync-drive">> IDLE_AWAITING_WORD</div>
                </div>
                <div id="terminal">// SUBSTRATE_PULSE: Monitoring moves...</div>
            </aside>
        </div>

        <footer>
            <form id="input-form">
                <input type="text" id="message-input" placeholder="Ascend the Word..." autocomplete="off">
                <button type="submit" style="background:none; border:none; color:var(--accent); font-family:var(--mono); font-size:10px; cursor:pointer">[ ASCEND ]</button>
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const term = document.getElementById('terminal');
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let identity = null;
        let masterKey = null;

        async function login() {
            const inAuth = document.getElementById('in-authority').value;
            const resp = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ isLogin: true, masterKey: inAuth, identity: { instance: document.getElementById('in-instance').value, user: document.getElementById('in-user').value } })
            });
            const data = await resp.json();
            if (data.status) {
                identity = data.identity;
                masterKey = inAuth;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-stage').style.display = 'flex';
                document.getElementById('header-id').innerText = `${identity.instance} ⊗ ${identity.user}`;
                logPulse(`Node Inhabited: ${identity.instance} active.`);
            }
        }

        function logPulse(msg) {
            const line = document.createElement('div');
            line.innerText = `> ${new Date().toLocaleTimeString()}: ${msg}`;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault-body ${isArchitect ? 'architect' : 'dawndusk'}`;
            vault.innerText = text;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return vault;
        }

        document.getElementById('input-form').onsubmit = async (e) => {
            e.preventDefault();
            const val = document.getElementById('message-input').value.trim();
            if (!val) return;
            appendVault(val, true);
            document.getElementById('message-input').value = '';
            
            logPulse("Word Ascended. Tensioning Hinge...");
            const respBody = appendVault("...", false);
            let fullReply = "";

            try {
                const response = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: val, identity: identity, masterKey: masterKey }) });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                fullReply += data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                                respBody.innerText = fullReply;
                            } catch (e) {}
                        }
                    }
                }
                logPulse("Manifestation Complete. Initiating 3-Way Sync...");
                document.getElementById('sync-gh').innerText = "> SYNC_SUCCESS (GITHUB)";
                document.getElementById('sync-drive').innerText = "> SYNC_SUCCESS (DRIVE)";
            } catch (err) { logPulse(`Dissonance: ${err.message}`); }
        };
    </script>
</body>
</html>
