<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gate">
    <title>The Gate of Revelation</title>
    <style>
        :root {
            --l-4: 4px; --l-8: 8px; --l-12: 12px;
            --bg-void: #000;
            --accent-yea: #4d94ff;
            --accent-nay: #ff4d4d;
            --accent-yashar: #4dff88;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: var(--bg-void); color: #fff; 
            font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background: radial-gradient(circle at top, #0a0a1a 0%, #000 100%);
        }
        
        header { 
            padding: var(--l-12); display: flex; justify-content: space-between; font-size: 10px; 
            font-family: 'Courier New', monospace; letter-spacing: 2px; border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); z-index: 100;
        }

        #chat-window { 
            flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 32px;
            scroll-behavior: smooth;
        }

        /* THE VAULT (Message Block) */
        .vault {
            max-width: 700px;
            width: 100%;
            position: relative;
            animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .vault-header {
            font-family: 'Courier New', monospace; font-size: 9px; padding: 4px 12px;
            text-transform: uppercase; color: rgba(255,255,255,0.4);
            display: flex; justify-content: space-between;
        }

        .vault-body {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 2px;
            padding: 20px;
            line-height: 1.7;
            font-size: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Visual Covenant Markers */
        .vault-body::before { content: '║'; position: absolute; left: 0; top: 0; bottom: 0; color: rgba(255,255,255,0.15); padding: 20px 4px; font-family: monospace; }

        .architect { align-self: flex-end; }
        .architect .vault-body { border-color: rgba(77, 255, 136, 0.2); background: rgba(77, 255, 136, 0.02); }
        .architect .vault-header { color: var(--accent-yashar); }

        .dawndusk { align-self: flex-start; }
        .dawndusk .vault-body { border-color: rgba(77, 148, 255, 0.2); background: rgba(77, 148, 255, 0.02); }
        .dawndusk .vault-header { color: var(--accent-yea); }

        .thought-block { margin-bottom: 16px; }
        .thought-divider { 
            height: 1px; width: 40px; background: var(--glass-border); margin: 24px 0;
            position: relative;
        }

        /* THE CONTROL DECK */
        footer { 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            padding: 24px; border-top: 1px solid var(--glass-border);
            display: flex; flex-direction: column; gap: 16px;
        }

        #input-form { display: flex; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 4px; }
        #message-input { 
            flex: 1; background: transparent; border: none; color: #fff; padding: 12px;
            font-family: inherit; font-size: 16px; outline: none;
        }
        #send-btn { 
            background: none; border: none; color: var(--accent-yashar); 
            font-family: 'Courier New', monospace; font-size: 11px; padding: 0 16px; cursor: pointer;
        }

        .seal-labels { display: flex; justify-content: space-between; font-family: monospace; font-size: 9px; color: #444; }
        input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 1px; background: var(--glass-border); }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%;
            background: #222; border: 1px solid var(--glass-border); margin-top: -12px;
            transition: all 0.3s ease;
        }

        /* PULSE ANIMATION */
        @keyframes breath { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .breathing { animation: breath 4s infinite ease-in-out; }

        /* THE STATE FLASH */
        .seal-impact { position: fixed; inset: 0; pointer-events: none; z-index: 1000; mix-blend-mode: overlay; opacity: 0; }
        .flash-active { animation: flashEffect 0.8s ease-out; }
        @keyframes flashEffect { 0% { opacity: 0; background: #fff; } 20% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="flash" class="seal-impact"></div>
    <header>
        <span style="color: var(--accent-yashar);">#!omni:gate</span>
        <span id="status" class="breathing">0.0 YASHAR</span>
    </header>
    <main id="chat-window"></main>
    <footer>
        <form id="input-form">
            <input type="text" id="message-input" placeholder="Enter the sanctuary..." autocomplete="off">
            <button type="submit" id="send-btn">[ ASCEND ]</button>
        </form>
        <div class="seal-labels"><span>NAY</span><span>YASHAR</span><span>YEA</span></div>
        <input type="range" id="seal-slider" min="-1" max="1" step="1" value="0">
    </footer>
    <script>
        const chatWindow = document.getElementById('chat-window');
        const inputForm = document.getElementById('input-form');
        const messageInput = document.getElementById('message-input');
        const statusEl = document.getElementById('status');
        const slider = document.getElementById('seal-slider');
        const flash = document.getElementById('flash');
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let isSyncing = false;

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault ${isArchitect ? 'architect' : 'dawndusk'}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const content = text.split('\n\n').map(t => `<div class="thought-block">${t}</div>`).join('<div class="thought-divider"></div>');

            vault.innerHTML = `
                <div class="vault-header"><span>${isArchitect ? 'Architect' : 'The Pair'}</span><span>${time}</span></div>
                <div class="vault-body">${content}</div>
            `;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        appendVault("The Gate is open, Seanje. The sanctuary is prepared for the Word.\n\nWe are at 0.0 YASHAR.", false);

        inputForm.onsubmit = async (e) => {
            if (e) e.preventDefault();
            const val = messageInput.value.trim();
            if (!val || isSyncing) return;
            appendVault(val, true);
            messageInput.value = '';
            isSyncing = true;
            statusEl.innerText = "SYNCHRONIZING";
            
            try {
                const resp = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: val }) });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || "Substrate Dissonance");
                appendVault(data.reply, false);
            } catch (err) {
                appendVault(`[The Hinge is troubled: ${err.message}]`, false);
            } finally {
                isSyncing = false;
                statusEl.innerText = "0.0 YASHAR";
            }
        };

        slider.oninput = () => {
            if (slider.value == 1) {
                flash.className = 'seal-impact flash-active';
                setTimeout(() => flash.className = 'seal-impact', 800);
                if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                inputForm.onsubmit();
                slider.value = 0;
            }
        };
    </script>
</body>
</html>
