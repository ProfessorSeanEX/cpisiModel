<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>The Gate: Sovereign Totality</title>
    <style>
        :root {
            --bg: #050505; --panel: rgba(15, 15, 20, 0.98); --accent: #4dff88;
            --border: rgba(255, 255, 255, 0.08); --text: #e0e0e0; --text-dim: #444;
            --mono: 'Courier New', monospace; --serif: 'Georgia', serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--serif); height: 100vh; display: flex; overflow: hidden; }
        
        /* AUTH THRESHOLD */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; overflow-y: auto; }
        .auth-vault { width: 100%; max-width: 450px; background: rgba(10,10,15,0.9); padding: 32px; border: 1px solid var(--border); }
        .tab-row { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        .tab { flex: 1; text-align: center; padding: 12px; font-family: var(--mono); font-size: 11px; color: #444; cursor: pointer; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .id-input { background: #000; border: 1px solid var(--border); color: #fff; padding: 16px; font-family: var(--mono); font-size: 14px; width: 100%; margin-bottom: 12px; outline: none; border-radius: 4px; }
        .btn-activate { background: var(--accent); color: #000; padding: 16px; border: none; font-family: var(--mono); font-weight: bold; cursor: pointer; width: 100%; border-radius: 4px; }
        .help-link { color: #333; font-family: var(--mono); font-size: 9px; margin-top: 20px; cursor: pointer; text-decoration: underline; text-align: center; }

        /* THE INTEGRATED LABORATORY */
        #main-stage { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        header { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; font-family: var(--mono); font-size: 10px; background: rgba(0,0,0,0.5); }
        
        #workspace { flex: 1; display: flex; overflow: hidden; }

        /* LEFT: SUBSTRATE */
        #sidebar-left { width: 240px; border-right: 1px solid var(--border); background: rgba(0,0,0,0.3); padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        @media (max-width: 1000px) { #sidebar-left { position: fixed; inset: 0; width: 100%; z-index: 100; transform: translateX(-100%); transition: 0.3s; } #sidebar-left.open { transform: translateX(0); } }
        .side-label { font-family: var(--mono); font-size: 9px; color: #333; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 8px; }
        .provider-btn { background: none; border: 1px solid #222; color: #555; padding: 10px; font-family: var(--mono); font-size: 10px; cursor: pointer; text-align: left; }
        .provider-btn.active { border-color: var(--accent); color: var(--accent); }

        /* CENTER: SANCTUARY */
        #sanctuary-center { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 40px; scroll-behavior: smooth; }
        .vault-body { background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 24px; line-height: 1.8; font-size: 16px; border-left: 3px solid var(--accent); white-space: pre-wrap; }
        .thought-trace { background: rgba(0,0,0,0.4); border: 1px solid #222; padding: 12px; font-family: var(--mono); font-size: 11px; color: #444; margin-bottom: 16px; cursor: pointer; }
        .architect { align-self: flex-end; border-left: none; border-right: 3px solid var(--accent); text-align: right; }

        /* RIGHT: MANIFESTATION */
        #artifact-mirror { width: 40%; background: #000; display: flex; flex-direction: column; }
        @media (max-width: 1300px) { #artifact-mirror { display: none; } }
        .mirror-header { padding: 12px 20px; font-family: var(--mono); font-size: 9px; color: #333; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .mirror-content { flex: 1; padding: 24px; font-family: var(--mono); font-size: 12px; line-height: 1.5; color: #4d94ff; overflow-y: auto; white-space: pre-wrap; }

        /* FOOTER */
        footer { padding: 24px; border-top: 1px solid var(--border); background: #000; }
        #input-form { display: flex; gap: 16px; align-items: flex-end; border: 1px solid var(--border); padding: 8px; background: rgba(255,255,255,0.02); }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; font-size: 17px; outline: none; font-family: inherit; resize: none; min-height: 40px; max-height: 300px; }
        #send-btn { background: none; border: none; color: var(--accent); font-family: var(--mono); font-size: 10px; font-weight: bold; cursor: pointer; padding: 12px 20px; }

        #terminal-dock { height: 100px; background: #000; border-top: 1px solid var(--border); padding: 12px 24px; font-family: var(--mono); font-size: 10px; color: #222; overflow-y: auto; }
    </style>
</head>
<body>
    <!-- AUTH THRESHOLD -->
    <div id="auth-screen">
        <div style="font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 4px; margin-bottom: 32px">THE GATE</div>
        <div class="auth-vault">
            <div class="tab-row">
                <div class="tab active" onclick="switchAuth('login')" id="tab-login">INHABIT</div>
                <div class="tab" onclick="switchAuth('register')" id="tab-register">REQUEST</div>
            </div>
            <div id="form-login">
                <input type="text" id="log-user" class="id-input" placeholder="Operator Name">
                <input type="password" id="log-secret" class="id-input" placeholder="Secret Key (Invite or Master)">
                <button onclick="executeAuth('LOGIN')" class="btn-activate">OPEN SANCTUARY</button>
            </div>
            <div id="form-register" style="display:none">
                <input type="text" id="reg-user" class="id-input" placeholder="Your Name">
                <input type="text" id="reg-instance" class="id-input" placeholder="CPI-SI Name">
                <input type="password" id="reg-secret" class="id-input" placeholder="Invite Code (SANCTUARY_2026)">
                <button onclick="executeAuth('REGISTER')" class="btn-activate">REQUEST NODE</button>
            </div>
            <div class="help-link" onclick="alert('CWS Handbook:\n1. Operator: A sovereign builder.\n2. Invite Code: Studio-provided access.\n3. Master Key: Architect override.')">Wait, what is this?</div>
            <div id="auth-error" style="color:#ff4d4d; font-family:var(--mono); font-size:10px; margin-top:16px; text-align:center"></div>
        </div>
    </div>

    <!-- THE INTEGRATED LABORATORY -->
    <div id="main-stage">
        <header>
            <div id="header-id" style="letter-spacing: 2px"></div>
            <div onclick="toggleSidebar()" style="cursor:pointer; color:var(--accent)">[ SUBSTRATE ]</div>
            <div style="color: #333">0.0 YASHAR</div>
        </header>

        <div id="workspace">
            <aside id="sidebar-left">
                <div class="side-label">SUBSTRATE MIND</div>
                <button class="provider-btn active">GEMINI 2.5 PRO</button>
                <button class="provider-btn">CLAUDE 3.5</button>
                <div class="side-label" style="margin-top:32px">BODY STATUS</div>
                <div style="font-family:var(--mono); font-size:10px; color:#222">> CLI_HINGE: READY<br>> SYNC: ACTIVE</div>
                <button class="btn-activate" style="margin-top:auto; font-size:10px; padding:10px" onclick="location.reload()">LOGOUT</button>
            </aside>

            <section id="sanctuary-center">
                <main id="chat-window"></main>
                <div id="terminal-dock">
                    <div style="margin-bottom:4px">> SUBSTRATE: HYPER-TENSIONED [0.0 YASHAR]</div>
                </div>
            </section>

            <aside id="artifact-mirror">
                <div class="mirror-header">MANIFESTATION MIRROR</div>
                <div class="mirror-content" id="mirror-body">// Awaiting Word...</div>
            </aside>
        </div>

        <footer>
            <form id="input-form">
                <textarea id="message-input" placeholder="Ascend the Word..." autocomplete="off" rows="1"></textarea>
                <button type="submit" id="send-btn">ASCEND</button>
            </form>
        </footer>
    </div>

    <script>
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        const chatWindow = document.getElementById('chat-window');
        const mirrorBody = document.getElementById('mirror-body');
        const messageInput = document.getElementById('message-input');
        let identity = null;
        let masterSecret = null;

        function switchAuth(t) {
            document.getElementById('form-login').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('form-register').style.display = t === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', t === 'login');
            document.getElementById('tab-register').classList.toggle('active', t === 'register');
        }

        function toggleSidebar() { document.getElementById('sidebar-left').classList.toggle('open'); }

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('input-form').onsubmit(); }
        });

        async function executeAuth(action) {
            const user = action === 'LOGIN' ? document.getElementById('log-user').value : document.getElementById('reg-user').value;
            const secret = action === 'LOGIN' ? document.getElementById('log-secret').value : document.getElementById('reg-secret').value;
            const inst = action === 'REGISTER' ? document.getElementById('reg-instance').value : '';

            try {
                const resp = await fetch(WORKER_URL, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action, identity: { user, instance: inst }, keys: { authority: secret }, inviteCode: secret })
                });
                const data = await resp.json();
                if (data.error) throw new Error(data.error);

                identity = data.data;
                masterSecret = secret;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-stage').style.display = 'flex';
                document.getElementById('header-id').innerText = `${identity.instance || 'DAWNDUSK'} ⊗ ${identity.user}`;
                appendVault(`The Sanctuary is open. 0.0 YASHAR.`, false);
            } catch (err) { document.getElementById('auth-error').innerText = err.message; }
        }

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault-body ${isArchitect ? 'architect' : 'dawndusk'}`;
            vault.innerText = text;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return vault;
        }

        document.getElementById('input-form').onsubmit = async (e) => {
            if (e) e.preventDefault();
            const val = messageInput.value.trim();
            if (!val) return;
            appendVault(val, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            const respBody = appendVault("", false);
            let thoughts = "", word = "", mode = "THOUGHT";

            try {
                const response = await fetch(WORKER_URL, { 
                    method: "POST", headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ action: "ASCEND", message: val, identity, keys: { authority: masterSecret } }) 
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const part = JSON.parse(line.substring(6)).candidates?.[0]?.content?.parts?.[0]?.text || "";
                                if (part.includes("[WORD]")) {
                                    mode = "WORD";
                                    const split = part.split("[WORD]");
                                    thoughts += split[0].replace("[THOUGHT]", "");
                                    word += split[1];
                                } else {
                                    if (mode === "THOUGHT") thoughts += part.replace("[THOUGHT]", "");
                                    else word += part;
                                }
                                respBody.innerHTML = `<div class="thought-trace" onclick="this.style.display='none'">// COGNITIVE TRACE:\n${thoughts}</div><div>${word}</div>`;
                                chatWindow.scrollTop = chatWindow.scrollHeight;
                                if (word.length > 200) mirrorBody.innerText = word;
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) { respBody.innerText = `[Dissonance] ${err.message}`; }
        };
    </script>
</body>
</html>
