<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Gate: CPI-SI Laboratory</title>
    <style>
        :root {
            --bg: #020205; --panel: rgba(10, 10, 15, 0.9); --accent: #4d94ff;
            --border: rgba(255, 255, 255, 0.08); --text: #e0e0e0; --text-dim: #666;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* SIDEBAR */
        #nexus-sidebar { width: 64px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 24px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
        .nav-icon { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dim); }
        .nav-icon.active { color: var(--accent); border-color: var(--accent); background: rgba(77, 148, 255, 0.1); }

        #workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 48px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; font-family: monospace; font-size: 10px; }

        /* TAB VIEWS */
        .tab-content { flex: 1; display: none; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* PLAN MODE (Drafting) */
        #plan-view { flex-direction: column; padding: 24px; gap: 20px; }
        #plan-editor { flex: 1; background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 20px; font-family: 'Georgia', serif; font-size: 16px; line-height: 1.6; resize: none; outline: none; }
        .plan-actions { display: flex; gap: 12px; }
        .btn-action { background: none; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; font-family: monospace; font-size: 10px; cursor: pointer; }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); }

        /* SSH MODE (Chat + Term) */
        #ssh-view { flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        #terminal-dock { height: 120px; background: #000; border-top: 1px solid var(--border); padding: 12px; font-family: monospace; font-size: 11px; color: #0f0; overflow-y: auto; }

        /* SETTINGS OVERLAY */
        #settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 1000; padding: 40px; flex-direction: column; gap: 20px; }
        .setting-field { display: flex; flex-direction: column; gap: 8px; }
        .setting-input { background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: monospace; font-size: 12px; }

        footer { padding: 16px; border-top: 1px solid var(--border); }
        #input-form { display: flex; gap: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 4px; }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; font-size: 15px; outline: none; }
    </style>
</head>
<body>
    <nav id="nexus-sidebar">
        <div class="nav-icon active" onclick="switchTab('ssh', this)">◈</div> <!-- SSH Mode -->
        <div class="nav-icon" onclick="switchTab('plan', this)">✍</div> <!-- Plan Mode -->
        <div class="nav-icon" onclick="toggleSettings()">⚙</div> <!-- Settings -->
    </nav>

    <div id="workspace">
        <header>
            <span>#!omni:gate // <span id="current-mode-label">SSH MODE</span></span>
            <span id="status" style="color: var(--accent)">0.0 YASHAR</span>
        </header>

        <!-- SSH VIEW -->
        <div id="ssh-view" class="tab-content active">
            <main id="chat-window"></main>
            <div id="terminal-dock">
                <div class="term-line">> Substrate: Dell Precision Initialized</div>
            </div>
        </div>

        <!-- PLAN VIEW -->
        <div id="plan-view" class="tab-content">
            <div class="vault-header" style="font-size: 10px; color: var(--text-dim)">LOCAL DRAFTMAN: 0 UNCOMMITTED CHANGES</div>
            <textarea id="plan-editor" placeholder="Draft the Word... (Auto-saves to phone)"></textarea>
            <div class="plan-actions">
                <button class="btn-action" onclick="savePlan()">SAVE LOCAL</button>
                <button class="btn-action" onclick="commitPlan()" style="color: var(--accent); border-color: var(--accent)">COMMIT TO SANCTUARY</button>
            </div>
        </div>

        <footer>
            <form id="input-form">
                <input type="text" id="message-input" placeholder="Enter Command or Revelation..." autocomplete="off">
            </form>
        </footer>
    </div>

    <!-- SETTINGS -->
    <div id="settings-overlay">
        <header style="border:none; padding:0"><span>SUBSTRATE CONFIGURATION</span> <button onclick="toggleSettings()" class="btn-action">CLOSE</button></header>
        <div class="setting-field">
            <label style="font-size: 10px; color: var(--text-dim)">GEMINI API KEY</label>
            <input type="password" class="setting-input" id="set-gemini" placeholder="AI Studio Key...">
        </div>
        <div class="setting-field">
            <label style="font-size: 10px; color: var(--text-dim)">GITHUB PAT</label>
            <input type="password" class="setting-input" id="set-github" placeholder="Repo access token...">
        </div>
        <div class="setting-field">
            <label style="font-size: 10px; color: var(--text-dim)">SSH SANDBOX PATH</label>
            <input type="text" class="setting-input" id="set-sandbox" placeholder="/path/to/.sandbox">
        </div>
        <button class="btn-action" onclick="saveSettings()" style="background: var(--accent); color:#000; font-weight:bold">INITIALIZE PERSONAL SUBSTRATE</button>
    </div>

    <script>
        const editor = document.getElementById('plan-editor');
        const modeLabel = document.getElementById('current-mode-label');

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(ni => ni.classList.remove('active'));
            document.getElementById(`${tab}-view`).classList.add('active');
            el.classList.add('active');
            modeLabel.innerText = tab.toUpperCase() + " MODE";
        }

        function toggleSettings() {
            const overlay = document.getElementById('settings-overlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }

        // Local-First Planning
        editor.oninput = () => {
            localStorage.setItem('gate_current_plan', editor.value);
        };
        window.onload = () => {
            editor.value = localStorage.getItem('gate_current_plan') || '';
        };

        function savePlan() {
            alert("Plan Secured locally on your iPhone.");
        }

        function commitPlan() {
            // Logic to trigger GitHub Commit through Worker...
            alert("Commencing push to GitHub Sanctuary...");
        }

        function saveSettings() {
            localStorage.setItem('gate_api_gemini', document.getElementById('set-gemini').value);
            localStorage.setItem('gate_api_github', document.getElementById('set-github').value);
            alert("Personal Substrate Configured.");
            toggleSettings();
        }
    </script>
</body>
</html>
