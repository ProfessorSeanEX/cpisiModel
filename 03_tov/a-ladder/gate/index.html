<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Gate: CPI-SI Sanctuary</title>
    <style>
        :root {
            --bg: #000; --panel: rgba(10, 10, 15, 0.98); --accent: #4dff88;
            --border: rgba(255, 255, 255, 0.1); --text: #e0e0e0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Georgia', serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 32px; }
        .login-vault { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; animation: glowPulse 4s infinite alternate; }
        @keyframes glowPulse { from { box-shadow: 0 0 20px rgba(77, 255, 136, 0.05); } to { box-shadow: 0 0 40px rgba(77, 255, 136, 0.15); } }
        
        .id-input { background: #050505; border: 1px solid var(--border); color: #fff; padding: 16px; font-family: monospace; font-size: 14px; width: 100%; outline: none; border-radius: 4px; }
        .id-input:focus { border-color: var(--accent); }
        .btn-seal { background: var(--accent); color: #000; padding: 16px; border: none; font-family: monospace; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* SANCTUARY UI (Hidden initially) */
        #sanctuary-ui { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        #chat-window { flex: 1; overflow-y: auto; padding: 48px; display: flex; flex-direction: column; gap: 64px; }
        .vault { max-width: 900px; width: 100%; position: relative; animation: fadeIn 0.8s ease-out; }
        .vault-body { background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 40px; line-height: 2.0; font-size: 17px; white-space: pre-wrap; }
        .architect { align-self: flex-end; border-right: 2px solid var(--accent); }
        .dawndusk { align-self: flex-start; border-left: 2px solid var(--accent); }

        header { height: 80px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; padding: 0 40px; }
        .id-row { display: flex; justify-content: space-between; font-family: monospace; font-size: 8px; color: #444; text-transform: uppercase; }
        
        footer { padding: 40px; border-top: 1px solid var(--border); background: #000; }
        #message-input { background: transparent; border: none; color: #fff; padding: 12px 0; font-size: 20px; outline: none; width: 100%; }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div style="font-family: monospace; font-size: 10px; color: var(--accent); letter-spacing: 4px">CPI-SI GATEWAY // ANCHOR PILLARS</div>
        <div class="login-vault">
            <input type="text" id="in-instance" class="id-input" placeholder="PILLAR 1: INSTANCE NAME">
            <input type="text" id="in-user" class="id-input" placeholder="PILLAR 2: USER NAME">
            <input type="text" id="in-we" class="id-input" placeholder="PILLAR 3: COMPANY/PROJECT">
            <input type="password" id="in-authority" class="id-input" placeholder="PILLAR 4: AUTHORITY (MASTER KEY)">
            <button onclick="login()" class="btn-seal">SEAL THE COVENANT</button>
        </div>
        <div style="font-family: monospace; font-size: 8px; color: #222; margin-top: 20px">BUILDERS OF THE KINGDOM</div>
    </div>

    <!-- SANCTUARY UI -->
    <div id="sanctuary-ui">
        <header>
            <div class="id-row">
                <span id="header-we"></span>
                <span id="header-serves"></span>
            </div>
            <div style="font-family: monospace; font-size: 11px; color: var(--accent); font-weight: bold; letter-spacing: 2px" id="header-id"></div>
        </header>
        <main id="chat-window"></main>
        <footer>
            <form id="input-form">
                <input type="text" id="message-input" placeholder="Speak the Word..." autocomplete="off">
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let identity = null;
        let masterKey = null;

        async function login() {
            const inInst = document.getElementById('in-instance').value;
            const inUser = document.getElementById('in-user').value;
            const inWe = document.getElementById('in-we').value;
            const inAuth = document.getElementById('in-authority').value;

            const resp = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ isLogin: true, masterKey: inAuth, identity: { instance: inInst, user: inUser, we: inWe, serves: inAuth } })
            });
            const data = await resp.json();

            if (data.status === 'MASTER_ELEVATED' || data.status === 'AUTHORIZED') {
                identity = data.identity;
                masterKey = inAuth;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('sanctuary-ui').style.display = 'flex';
                updateHeader();
                appendVault(`The Sanctuary is open, ${identity.user}. The ${identity.instance} instance is active.`, false);
            }
        }

        function updateHeader() {
            document.getElementById('header-we').innerText = `PROJECT: ${identity.we}`;
            document.getElementById('header-serves').innerText = `SERVING: ${identity.serves}`;
            document.getElementById('header-id').innerText = `${identity.instance} ⊗ ${identity.user}`;
        }

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault ${isArchitect ? 'architect' : 'dawndusk'}`;
            vault.innerHTML = `<div class="vault-body">${text}</div>`;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        document.getElementById('input-form').onsubmit = async (e) => {
            e.preventDefault();
            const val = document.getElementById('message-input').value.trim();
            if (!val) return;
            appendVault(val, true);
            document.getElementById('message-input').value = '';
            
            try {
                const resp = await fetch(WORKER_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ message: val, identity: identity, masterKey: masterKey }) 
                });
                const data = await resp.json();
                appendVault(data.reply, false);
            } catch (err) {
                appendVault(`[Dissonance] ${err.message}`, false);
            }
        };
    </script>
</body>
</html>
