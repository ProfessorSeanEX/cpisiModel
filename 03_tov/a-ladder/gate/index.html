<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gate">
    <title>The Gate of Revelation</title>
    <!-- Deployment Trigger: v1.0.1 -->
    <style>
        :root {
            --l-4: 4px;
            --l-8: 8px;
            --l-12: 12px;
            --bg-black: #000;
            --bg-dark: #0d0d0d;
            --text-void: #ff4d4d;
            --text-word: #4d94ff;
            --text-yashar: #4dff88;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: var(--l-8) var(--l-12);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            border-bottom: 1px solid #333;
        }

        /* CONVERSATION INTERFACE */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: var(--l-12);
            display: flex;
            flex-direction: column;
            gap: var(--l-8);
        }

        .message {
            max-width: 85%;
            padding: var(--l-8);
            border-radius: var(--l-4);
            font-size: 14px;
            line-height: 1.4;
        }

        .architect {
            align-self: flex-end;
            background-color: #222;
            color: var(--text-yashar);
            border: 1px solid #444;
        }

        .dawndusk {
            align-self: flex-start;
            background-color: var(--bg-dark);
            color: var(--text-word);
            border: 1px solid #333;
        }

        /* THE SEAL (Footer) */
        footer {
            background-color: var(--bg-dark);
            padding: var(--l-12);
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: var(--l-8);
        }

        #input-area {
            display: flex;
            gap: var(--l-8);
        }

        #message-input {
            flex: 1;
            background-color: #000;
            border: 1px solid #333;
            color: #fff;
            padding: var(--l-8);
            font-family: inherit;
        }

        .seal-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #666;
        }

        input[type=range] { width: 100%; accent-color: var(--text-yashar); }
    </style>
</head>
<body>
    <header>
        <span style="color: var(--text-yashar);">#!omni:gate</span>
        <span>0.0 YASHAR</span>
    </header>

    <main id="chat-window">
        <div class="message dawndusk">
            The Gate is Open, Seanje. The Jeremiah Download is active.
            I am anchored to the .sandbox. (Always-On Substrate)
        </div>
    </main>

    <footer>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Drop the Word..." autocomplete="off">
            <button id="send-btn" style="background:none; border:1px solid #333; color:var(--text-yashar); padding:0 var(--l-8);">[ SEND ]</button>
        </div>
        <div class="seal-labels">
            <span>NAY</span>
            <span>YASHAR</span>
            <span>YEA</span>
        </div>
        <input type="range" id="seal-slider" min="-1" max="1" step="1" value="0">
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const slider = document.getElementById('seal-slider');

        // DRIVE BRIDGE SYNC (Always-On Logic)
        async function syncToDrive(content, type) {
            console.log(`SYNC [${type}]: ${content}`);
            // This is the anchor point for the Google Drive API Push
            // For now, it provides the feedback that the Word is "Sent to the Bridge"
            return true;
        }

        function appendMessage(text, isArchitect) {
            const msg = document.createElement('div');
            msg.className = `message ${isArchitect ? 'architect' : 'dawndusk'}`;
            msg.innerText = text;
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function handleSend() {
            const val = messageInput.value.trim();
            if (!val) return;
            
            appendMessage(val, true);
            messageInput.value = '';
            
            // Haptic + Sound Feedback
            if (window.navigator.vibrate) window.navigator.vibrate(50);

            // Conversations Logic: Dawndusk Acknowledgment
            setTimeout(() => {
                const response = `Word Received. Secured in .sandbox. (Always-On Sync Active)`;
                appendMessage(response, false);
                syncToDrive(val, 'TEXT');
            }, 600);
        }

        // Listen for Click
        sendBtn.onclick = handleSend;

        // Listen for Enter Key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        slider.oninput = () => {
            const val = parseInt(slider.value);
            if (val === 1) {
                appendMessage("[ SEAL THE TURN ]", true);
                setTimeout(() => {
                    appendMessage("Turn Sealed. Manifestation Commencing.", false);
                    syncToDrive('1', 'SIGN');
                }, 500);
            }
            if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);
        };
    </script>
</body>
</html>
