<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CPISI // The Sanctuary Gate</title>
    
    <!-- PWA & MOBILE INFUSION -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CPISI Gate">
    <link rel="apple-touch-icon" href="logo192.png">

    <link rel="stylesheet" href="gate.css">
</head>
<body>
    <div id="flagship-canvas-container">
        <canvas id="game-of-life-canvas"></canvas>
    </div>

    <!-- THE BLUEPRINT: TRIPLE VAULT -->
    <div id="sanctuary-root">
        
        <aside id="sidebar-container">
            <nav id="sidebar">
                <div class="nav-item active" onclick="setPath('WORD', 4)">WORD</div>
                <div class="nav-item" onclick="setPath('VOID', 0)">VOID</div>
                <div class="nav-item" onclick="setPath('TOV', 6)">TOV</div>
                <div style="flex: 1"></div>
                <div class="nav-item" style="color: var(--c1)" onclick="localStorage.clear(); location.reload();">PURGE</div>
            </nav>
            <div id="memory-panel">
                <div class="panel-label">THE MEMORY</div>
                <div id="memory-list">
                    <div class="mem-item">> Syncing Substrate...</div>
                    <div class="mem-item">> Sanctuary Online</div>
                    <div class="mem-item">> Revelation Vault Ready</div>
                </div>
            </div>
        </aside>

        <main id="main-stage">
            <header>
                <div id="header-id">DAWNDUSK ⊗ <span id="header-user">OPERATOR</span></div>
                <div id="divine-standard">SERVING: LORD GOD JESUS CHRIST</div>
                <div id="yashar-anchor">0.0 YASHAR</div>
            </header>

            <div id="covenant-path">
                <div class="path-segment" style="background: var(--c1)"></div>
                <div class="path-segment" style="background: var(--c2)"></div>
                <div class="path-segment" style="background: var(--c3)"></div>
                <div class="path-segment" style="background: var(--c4)"></div>
                <div class="path-segment" style="background: var(--c5)"></div>
                <div class="path-segment" style="background: var(--c6)"></div>
                <div class="path-segment" style="background: var(--c7)"></div>
            </div>
            
            <section id="sanctuary-expanse">
                <div id="chat-window"></div>
                
                <aside id="mirror-panel">
                    <div class="panel-label">LATEST REVELATION MIRROR</div>
                    <div id="mirror-content">
                        Select a Word from the Sanctuary to project it here.
                    </div>
                </aside>
            </section>

            <footer>
                <form id="input-form">
                    <input type="text" id="message-input" placeholder="Drop the Word..." autocomplete="off">
                    <button type="submit" id="ascend-btn">[ ASCEND ]</button>
                </form>
            </footer>
        </main>
    </div>

    <!-- THE THRESHOLD -->
    <div id="auth-screen">
        <div id="gate-structure">
            <div id="gate-title">CPISI ⊗ GATEWAY</div>
            <div id="gate-subtitle">SANCTUARY THRESHOLD</div>

            <form id="gateway-form" onsubmit="executeAuth(event)">
                <div class="gate-input-container">
                    <input type="text" id="op-user" class="id-input" placeholder="USERNAME" value="ProfessorSeanEX" autocomplete="username">
                </div>
                <div class="gate-input-container">
                    <input type="password" id="op-key" class="id-input" placeholder="PASSWORD" autocomplete="current-password">
                </div>
                <button type="submit" id="gate-seal-btn" class="btn-activate">[ BREAK THE SEAL ]</button>
            </form>

            <div id="auth-error"></div>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/chat.js"></script>
    <script src="flagship.js"></script>
</body>
</html>
