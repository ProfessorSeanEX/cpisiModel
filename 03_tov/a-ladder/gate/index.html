<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>The Game of Life - Dawndusk Sync</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            border: 1px solid #333;
            image-rendering: pixelated;
        }
        .vault-border {
            border: 4px double #333;
            padding: 20px;
            background: #050505;
        }
        #status {
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="vault-border">
        <canvas id="game-of-life-canvas"></canvas>
        <div id="status">STATE: YASHAR (0.0) | SYNC: ACTIVE</div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
