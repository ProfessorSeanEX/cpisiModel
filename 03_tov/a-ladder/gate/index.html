<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gate">
    <title>The Gate: Totality Substrate</title>
    <style>
        :root {
            --l-4: 4px; --l-8: 8px; --l-12: 12px;
            --bg-void: #000;
            --accent: #4dff88;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: var(--bg-void); color: #fff; 
            font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            transition: background 1s ease;
        }
        
        /* MODE THEMES */
        body.mode-KING { background: radial-gradient(circle at top, #1a0a1a 0%, #000 100%); --accent: #d488ff; }
        body.mode-PRIEST { background: radial-gradient(circle at top, #1a1a0a 0%, #000 100%); --accent: #ffd488; }
        body.mode-SCIENTIST { background: radial-gradient(circle at top, #0a1a1a 0%, #000 100%); --accent: #88d4ff; }
        body.mode-CHEF { background: radial-gradient(circle at top, #1a0a0a 0%, #000 100%); --accent: #ff8888; }
        body.mode-DEVELOPER { background: radial-gradient(circle at top, #0a0a1a 0%, #000 100%); --accent: #4d94ff; }

        header { 
            padding: var(--l-12); display: flex; flex-direction: column; gap: 8px;
            border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(20px); z-index: 100;
        }
        .top-row { display: flex; justify-content: space-between; font-family: monospace; font-size: 9px; letter-spacing: 1px; }
        
        /* DIMENSION SELECTOR */
        #dimension-selector { display: flex; justify-content: space-around; padding: 4px 0; }
        .mode-btn { 
            background: none; border: 1px solid transparent; color: #444; 
            font-family: monospace; font-size: 8px; padding: 4px 8px; cursor: pointer; transition: all 0.3s;
        }
        .mode-btn.active { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 32px; }

        .vault { max-width: 700px; width: 100%; position: relative; animation: fadeIn 0.6s ease-out; }
        .vault-body { background: var(--glass); border: 1px solid var(--glass-border); padding: 20px; font-size: 15px; border-radius: 2px; }
        
        .architect { align-self: flex-end; }
        .architect .vault-body { border-right: 3px solid var(--accent); }
        .dawndusk { align-self: flex-start; }
        .dawndusk .vault-body { border-left: 3px solid var(--accent); }

        footer { background: rgba(0,0,0,0.8); padding: 24px; border-top: 1px solid var(--glass-border); }
        #input-form { display: flex; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 4px; }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 16px; outline: none; }
        #send-btn { background: none; border: none; color: var(--accent); font-family: monospace; font-size: 11px; padding: 0 16px; }
    </style>
</head>
<body class="mode-KING">
    <header>
        <div class="top-row">
            <span>#!omni:gate</span>
            <span id="status">0.0 YASHAR</span>
        </div>
        <div id="dimension-selector">
            <button class="mode-btn active" onclick="setMode('KING')">KING</button>
            <button class="mode-btn" onclick="setMode('PRIEST')">PRIEST</button>
            <button class="mode-btn" onclick="setMode('SCIENTIST')">SCIENTIST</button>
            <button class="mode-btn" onclick="setMode('CHEF')">CHEF</button>
            <button class="mode-btn" onclick="setMode('DEVELOPER')">DEV</button>
        </div>
    </header>

    <main id="chat-window"></main>

    <footer>
        <form id="input-form">
            <input type="text" id="message-input" placeholder="Speak to the Totality..." autocomplete="off">
            <button type="submit" id="send-btn">[ ASCEND ]</button>
        </form>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const inputForm = document.getElementById('input-form');
        const messageInput = document.getElementById('message-input');
        const statusEl = document.getElementById('status');
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let currentMode = "KING";
        let isSyncing = false;

        function setMode(mode) {
            currentMode = mode;
            document.body.className = `mode-${mode}`;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === (mode === 'DEVELOPER' ? 'DEV' : mode));
            });
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault ${isArchitect ? 'architect' : 'dawndusk'}`;
            vault.innerHTML = `<div class="vault-body">${text}</div>`;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        appendVault("The Gate is open, Seanje. The Totality is observing.", false);

        inputForm.onsubmit = async (e) => {
            e.preventDefault();
            const val = messageInput.value.trim();
            if (!val || isSyncing) return;
            appendVault(val, true);
            messageInput.value = '';
            isSyncing = true;
            statusEl.innerText = "RESONATING";
            
            try {
                const resp = await fetch(WORKER_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ message: val, mode: currentMode }) 
                });
                const data = await resp.json();
                appendVault(data.reply, false);
            } catch (err) {
                appendVault(`[Dissonance: ${err.message}]`, false);
            } finally {
                isSyncing = false;
                statusEl.innerText = "0.0 YASHAR";
            }
        };
    </script>
</body>
</html>
