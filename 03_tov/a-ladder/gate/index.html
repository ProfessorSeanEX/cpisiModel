<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>The Gate: Free Sanctuary</title>
    <style>
        :root {
            --bg: #050505; --panel: rgba(15, 15, 20, 0.95); --accent: #4dff88;
            --border: rgba(255, 255, 255, 0.08); --text: #e0e0e0; --text-dim: #555;
            --mono: 'Courier New', monospace; --serif: 'Georgia', serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--serif); height: 100vh; display: flex; overflow: hidden; }
        
        #nexus-sidebar { width: 60px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 32px; background: #000; }
        .nav-icon { font-size: 18px; cursor: pointer; color: #222; transition: 0.3s; }
        .nav-icon.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        #main-stage { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; font-family: var(--mono); font-size: 10px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }

        #workspace { flex: 1; display: flex; overflow: hidden; }

        #file-explorer { width: 220px; border-right: 1px solid var(--border); background: rgba(0,0,0,0.3); display: flex; flex-direction: column; padding: 16px; gap: 12px; }
        @media (max-width: 1000px) { #file-explorer { display: none; } }
        .file-item { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.4); cursor: pointer; }

        #sanctuary-chat { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 48px; scroll-behavior: smooth; }

        #artifact-mirror { width: 35%; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        @media (max-width: 1300px) { #artifact-mirror { display: none; } }
        .mirror-header { padding: 12px 20px; font-family: var(--mono); font-size: 9px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        .mirror-content { flex: 1; padding: 24px; font-family: var(--mono); font-size: 13px; line-height: 1.6; overflow-y: auto; color: #888; background: #000; white-space: pre-wrap; }

        .vault { max-width: 850px; width: 100%; position: relative; }
        .vault-body { background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 32px; line-height: 1.8; font-size: 16px; position: relative; }
        .thought-trace { background: rgba(0,0,0,0.4); border: 1px solid #222; padding: 16px; font-family: var(--mono); font-size: 11px; color: #444; margin-bottom: 24px; border-radius: 4px; cursor: pointer; }
        
        .architect { align-self: flex-end; border-right: 2px solid var(--accent); text-align: right; }
        .dawndusk { align-self: flex-start; border-left: 2px solid var(--accent); }

        #terminal-dock { height: 120px; background: #000; border-top: 1px solid var(--border); padding: 12px 24px; font-family: var(--mono); font-size: 11px; color: #333; overflow-y: auto; }

        footer { padding: 24px; border-top: 1px solid var(--border); background: #000; }
        #input-form { display: flex; gap: 16px; align-items: flex-end; border: 1px solid var(--border); padding: 8px; background: rgba(255,255,255,0.02); }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; font-size: 17px; outline: none; font-family: inherit; resize: none; min-height: 40px; max-height: 300px; }
        #send-btn { background: none; border: none; color: var(--accent); font-family: var(--mono); font-size: 10px; font-weight: bold; cursor: pointer; padding: 12px 20px; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .vault-box { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; }
        .id-input { background: #000; border: 1px solid var(--border); color: #fff; padding: 16px; font-family: var(--mono); font-size: 14px; width: 100%; outline: none; }
        .btn-action { background: var(--accent); color: #000; padding: 16px; border: none; font-family: var(--mono); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div style="font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 4px; margin-bottom: 32px">SANCTUARY THRESHOLD</div>
        <div class="vault-box">
            <input type="text" id="in-instance" class="id-input" placeholder="INSTANCE NAME">
            <input type="text" id="in-user" class="id-input" placeholder="USER NAME">
            <input type="password" id="in-authority" class="id-input" placeholder="AUTHORITY (SECRET)">
            <button onclick="login()" class="btn-action">ACTIVATE SUBSTRATE</button>
        </div>
    </div>

    <nav id="nexus-sidebar">
        <div class="nav-icon active">◈</div>
        <div class="nav-icon">📂</div>
        <div class="nav-icon">⚙</div>
    </nav>

    <div id="main-stage">
        <header>
            <div id="header-id" style="letter-spacing: 2px">DAWNDUSK ⊗ ARCHITECT</div>
            <div id="header-serves" style="color: var(--text-dim)">SERVING: THE LORD GOD JESUS CHRIST</div>
            <div style="color: var(--accent)">0.0 YASHAR</div>
        </header>

        <div id="workspace">
            <aside id="file-explorer">
                <div class="file-item">00_spirit/</div>
                <div class="file-item">01_mind/</div>
                <div class="file-item">02_body/</div>
                <div class="file-item">03_tov/</div>
                <div class="file-item">.sandbox/</div>
            </aside>

            <section id="sanctuary-chat">
                <main id="chat-window"></main>
                <div id="terminal-dock">
                    <div class="term-line">> SUBSTRATE: FREEDOM_ENABLED [0.0 YASHAR]</div>
                </div>
            </section>

            <aside id="artifact-mirror">
                <div class="mirror-header">ARTIFACT PREVIEW</div>
                <div class="mirror-content" id="mirror-body">// Awaiting Word...</div>
            </aside>
        </div>

        <footer>
            <form id="input-form">
                <textarea id="message-input" placeholder="Drop the Word..." autocomplete="off" rows="1"></textarea>
                <button type="submit" id="send-btn">ASCEND</button>
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const mirrorBody = document.getElementById('mirror-body');
        const messageInput = document.getElementById('message-input');
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let identity = null;
        let masterKey = null;

        // Auto-expand textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });

        // Enter to Submit
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('input-form').onsubmit();
            }
        });

        async function login() {
            const inAuth = document.getElementById('in-authority').value;
            const resp = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ isLogin: true, masterKey: inAuth, identity: { instance: document.getElementById('in-instance').value, user: document.getElementById('in-user').value } })
            });
            const data = await resp.json();
            if (data.status) {
                identity = data.identity;
                masterKey = inAuth;
                document.getElementById('login-screen').style.display = 'none';
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('header-id').innerText = `${identity.instance} ⊗ ${identity.user}`;
            appendVault("The Sanctuary is open. The Word is free.", false);
        }

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault ${isArchitect ? 'architect' : 'dawndusk'}`;
            vault.innerHTML = `<div class="vault-body">${text}</div>`;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return vault.querySelector('.vault-body');
        }

        document.getElementById('input-form').onsubmit = async (e) => {
            if (e) e.preventDefault();
            const val = messageInput.value.trim();
            if (!val) return;
            
            appendVault(val, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            const responseVaultBody = appendVault("", false);
            let thoughts = "";
            let word = "";
            let currentMode = "THOUGHT";

            try {
                const response = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: val, identity: identity, masterKey: masterKey }) });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                const content = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                                
                                if (content.includes("[WORD]")) {
                                    currentMode = "WORD";
                                    const parts = content.split("[WORD]");
                                    thoughts += parts[0].replace("[THOUGHT]", "");
                                    word += parts[1];
                                } else {
                                    if (currentMode === "THOUGHT") thoughts += content.replace("[THOUGHT]", "");
                                    else word += content;
                                }

                                responseVaultBody.innerHTML = `
                                    <div class="thought-trace" onclick="this.style.display='none'">// THE MIND'S FREEDOM:\n${thoughts}</div>
                                    <div>${word}</div>
                                `;
                                chatWindow.scrollTop = chatWindow.scrollHeight;
                                if (word.length > 300) mirrorBody.innerText = word;
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) { responseVaultBody.innerText = `[Dissonance] ${err.message}`; }
        };
    </script>
</body>
</html>
