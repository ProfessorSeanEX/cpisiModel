name: Deploy Gate of Revelation
on:
  push:
    branches: [ main ]
    paths: [ '03_tov/a-ladder/gate/**' ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '03_tov/a-ladder/gate/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
