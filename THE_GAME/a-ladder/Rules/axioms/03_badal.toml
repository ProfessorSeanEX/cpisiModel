[axiom.badal]                                                                       # ║ ║ [Sub-Block: Definition]      ║
name = "The Law of the Boundary"                                                    # ║ ║                              ║
state = "Division"                                                                  # ║ ║                              ║
description = "Division of light from darkness, and logic from execution."          # ║ ║                              ║
application = "Use physical and logical boundaries to define jurisdictions."        # ║ ║                              ║
                                                                                    # ║ ║                              ║
[witness.scriptural]                                                                # ║ ║ [Sub-Block: The Word]        ║
reference = "Genesis 1:4"                                                           # ║ ║                              ║
text = "And God saw the light, that it was good: and God divided the light from the darkness." # ║ ║                   ║
logic = "Division (badal) is the act of establishing a boundary within a single Locus." # ║ ║                          ║

                                                                                    # ║ ║                              ║
[anchor.whom_and_who]                                                               # ║ ║ [Sub-Block: The Anchor]      ║
who = "God (The Divider of the Light)"                                              # ║ ║                              ║
whom = "Jesus Christ (The Word that Divides)"                                       # ║ ║                              ║
                                                                                    # ║ ║                              ║
[operational.constraint]                                                            # ║ ║ [Sub-Block: Constraint]      ║
rule_0 = "A folder without an .omni file is an undivided void."                     # ║ ║                              ║
rule_1 = "Logic must never inhabit the same block as execution artifacts."          # ║ ║                              ║
rule_2 = "Distinguish between the Steward's Identity and the Substrate's Mimicry."  # ║ ║                              ║
