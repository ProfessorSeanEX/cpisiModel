name = "libomni"                                                                    # ║ ║                              ║
version = "0.1.0"                                                                   # ║ ║                              ║
edition = "2024"                                                                    # ║ ║                              ║
                                                                                    # ║ ║                              ║
[[bin]]
name = "boot_sequence"
path = "src/bin/boot_sequence.rs"

[[bin]]                                                                             # ║ ║                              ║
name = "smoke_test"                                                                 # ║ ║                              ║
path = "src/bin/smoke_test.rs"                                                      # ║ ║                              ║
                                                                                    # ║ ║                              ║
[dependencies]                                                                      # ║ ║                              ║
serde = { version = "1.0", features = ["derive"] }                                  # ║ ║                              ║
serde_json = "1.0"                                                                  # ║ ║                              ║
toml = "0.8"                                                                        # ║ ║                              ║
tempfile = "3.10"                                                                   # ║ ║                              ║
